name: Verify

# Pull-request gate. deploy.yml only runs on push to master, so until this
# existed a branch got no lint, no build, and no accessibility audit — problems
# were caught by the production deploy after the fact. This runs the same checks
# against the same assembled _site, minus anything with a side effect: no
# Cloudflare redirect sync, no github-pages environment, no deploy.

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build & accessibility audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Pa11y bundles Puppeteer, which downloads Chrome on install. Skip it —
          # the audit discovers the Playwright Chromium at runtime (.pa11yci.cjs).
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Lint & format check
        run: |
          npm run lint
          npm run format:check

      - name: Assemble site and compile Tailwind CSS
        run: bash scripts/build-site.sh

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Accessibility audit (axe + pa11y)
        run: bash scripts/a11y-audit.sh --no-lint --serve-dir=_site
