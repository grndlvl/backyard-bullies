name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One production deploy at a time; let in-progress runs finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Pa11y bundles Puppeteer, which downloads Chrome on install. Skip it —
          # the audit discovers the Playwright Chromium at runtime (.pa11yci.cjs).
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Lint & format check
        run: |
          npm run lint
          npm run format:check

      - name: Synchronize Cloudflare redirects
        run: npm run sync:redirects
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Assemble site and compile Tailwind CSS
        run: |
          mkdir -p _site/assets
          cp index.html _site/
          cp -r parents-night-out _site/
          cp -r homeschool-functional-fitness _site/
          cp -r scholarship _site/
          cp -r images _site/
          cp robots.txt sitemap.xml llms.txt _site/
          cp CNAME _site/
          touch _site/.nojekyll
          npx tailwindcss -i ./src/input.css -o ./_site/assets/tailwind.css --minify

          # Cache-bust the stylesheet. assets/tailwind.css is a stable filename
          # with mutable content sitting behind a 4-hour Cloudflare TTL, so a
          # deploy that adds classes serves stale CSS until the TTL expires and
          # new pages render unstyled. Stamping the content hash onto the href
          # gives changed CSS a URL the CDN has never cached.
          CSS_HASH="$(sha256sum _site/assets/tailwind.css | cut -c1-12)"
          find _site -name '*.html' -exec \
            sed -i "s|assets/tailwind\.css|assets/tailwind.css?v=${CSS_HASH}|g" {} +
          echo "Stylesheet versioned as ?v=${CSS_HASH}"
          grep -rho 'assets/tailwind\.css?v=[a-f0-9]*' _site --include='*.html' | sort -u

      # Accessibility audit: render the assembled _site and run axe-core (via
      # Playwright) + Pa11y-CI. This is blocking: WCAG regressions fail the
      # deploy before the GitHub Pages artifact is uploaded. Linting already ran
      # above, so skip it here with --no-lint.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Accessibility audit (axe + pa11y)
        run: bash scripts/a11y-audit.sh --no-lint --serve-dir=_site

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
